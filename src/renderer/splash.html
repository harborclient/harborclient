<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HarborClient</title>
  <style>
    :root {
      color-scheme: light dark;
      --surface: #f5f5f7;
      --text: rgba(0, 0, 0, 0.85);
      --text-secondary: rgba(0, 0, 0, 0.55);
      --accent: #007aff;
      --separator: rgba(0, 0, 0, 0.08);
      --shadow: rgba(0, 0, 0, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface: #1e1e1e;
        --text: rgba(255, 255, 255, 0.85);
        --text-secondary: rgba(255, 255, 255, 0.55);
        --accent: #0a84ff;
        --separator: rgba(255, 255, 255, 0.08);
        --shadow: rgba(0, 0, 0, 0.45);
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .splash {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding: 36px 44px 32px;
      background: var(--surface);
      border-radius: 6px;
      box-shadow: 0 8px 32px var(--shadow);
      border: 1px solid var(--separator);
    }

    .splash-main {
      display: flex;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .logo {
      width: 260px;
      height: auto;
      aspect-ratio: 1 / 1;
    }

    .splash-footer {
      display: flex;
      flex-shrink: 0;
      flex-direction: column;
      gap: 16px;
      margin-top: 12px;
    }

    .version {
      margin: 0;
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.4;
      text-align: center;
    }

    .progress-track {
      width: 100%;
      height: 3px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--separator);
    }

    .progress-bar {
      width: 33%;
      height: 100%;
      border-radius: 999px;
      background: var(--accent);
      animation: slide 1.2s ease-in-out infinite;
    }

    @keyframes slide {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(400%);
      }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .progress-bar {
        animation: none;
        width: 100%;
        transform: none;
      }
    }
  </style>
</head>

<body>
  <div class="splash" aria-busy="true">
    <h1 class="sr-only">HarborClient</h1>
    <div class="splash-main">
      <img class="logo" src="./logo.png" alt="" aria-hidden="true" width="500" height="500" />
    </div>
    <div class="splash-footer">
      <p id="splash-status" class="sr-only" role="status" aria-live="polite">
        Loading HarborClient.
      </p>
      <p id="app-version" class="version" aria-hidden="true"></p>
      <div class="progress-track" aria-hidden="true">
        <div class="progress-bar"></div>
      </div>
    </div>
  </div>
</body>

</html>
