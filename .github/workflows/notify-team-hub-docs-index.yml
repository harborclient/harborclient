name: Notify team-hub docs index update

on:
  push:
    branches:
      - main
    paths:
      - resources/docsSearchIndex.json

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger team-hub deploy
        env:
          HUB_DEPLOY_PAT: ${{ secrets.HUB_DEPLOY_PAT }}
        run: |
          set -euo pipefail
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${HUB_DEPLOY_PAT}" \
            https://api.github.com/repos/harborclient/team-hub/dispatches \
            -d '{"event_type":"docs-index-updated","client_payload":{"sha":"'"${{ github.sha }}"'","ref":"'"${{ github.ref }}"'"}}'
